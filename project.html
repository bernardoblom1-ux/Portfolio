  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f2f2f2;
      --bg-alt: #e8e8e8;
      --text: #0d0d0d;
      --muted: #71717a;
      --accent: #00b37e;
      --border: #d8d8d8;
      --nav-h: 68px;
      --max-w: 1280px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.6; -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ─────────────────────────────── */
    nav {
      position: fixed; inset: 0 0 auto 0;
      height: var(--nav-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(20px, 5vw, 64px);
      background: rgba(242,242,242,.88);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border); z-index: 100;
    }
    .nav-back {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 500; color: var(--muted);
      text-decoration: none; transition: color .2s;
    }
    .nav-back:hover { color: var(--text); }
    .nav-back svg { transition: transform .2s; }
    .nav-back:hover svg { transform: translateX(-3px); }
    .nav-logo {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--text); text-decoration: none;
    }

    /* ── LAYOUT ──────────────────────────── */
    .page {
      max-width: var(--max-w); margin: 0 auto;
      padding: calc(var(--nav-h) + 64px) clamp(20px, 5vw, 64px) 120px;
    }

    /* ── HEADER ──────────────────────────── */
    .project-header { margin-bottom: 56px; }

    .project-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .meta-year { font-size: 11px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: var(--muted); }
    .meta-dot  { width: 3px; height: 3px; border-radius: 50%; background: var(--border); }
    .meta-cat  { font-size: 11px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: var(--accent); }

    .project-title {
      font-size: clamp(36px, 6vw, 80px); font-weight: 800;
      letter-spacing: -2.5px; line-height: .95; color: var(--text); margin-bottom: 22px;
    }
    .project-desc { font-size: clamp(15px, 1.4vw, 17px); color: var(--muted); line-height: 1.75; max-width: 640px; }

    /* ── GALLERY ─────────────────────────── */
    .gallery { display: flex; flex-direction: column; gap: 10px; }

    .gallery-video-wrap {
      width: 100%; aspect-ratio: 16/9;
      border-radius: 16px; overflow: hidden; background: #000;
    }
    .gallery-video-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

    .gallery-img-wrap { width: 100%; border-radius: 16px; overflow: hidden; background: var(--bg-alt); }
    .gallery-img { display: block; width: 100%; height: auto; }

    /* ── NOT FOUND ───────────────────────── */
    .not-found {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 60svh; text-align: center; gap: 14px;
    }
    .not-found h2 { font-size: 28px; font-weight: 800; letter-spacing: -1px; color: var(--text); }
    .not-found p  { font-size: 14px; color: var(--muted); }
    .not-found a  { font-size: 13px; font-weight: 600; color: var(--accent); text-decoration: none; border-bottom: 1.5px solid var(--accent); padding-bottom: 2px; margin-top: 4px; }
  </style>
